<main class="main-content">

  <div class="page-banner">
    <img src="images/users-icon.svg" alt="" />
    <div class="page-banner-overlay">
      <i class="ri-team-line"></i>
      <div>
        <div class="pb-title">Team Members</div>
        <div class="pb-sub">Add, edit and manage roles &amp; permissions</div>
      </div>
      <div (click)="openAddNewUserPopup('')" style="margin-left:auto"><button class="btn btn-primary btn-sm"><i class="ri-user-add-line"></i> Add
          User</button></div>
    </div>
  </div>


  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">Team Members</div>
        <div class="card-subtitle">{{totalUserCount}} members</div>
      </div>
      <!-- <button class="btn btn-primary btn-sm"><i class="ri-user-add-line"></i> Add User</button> -->
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:50px">Avatar</th>
            <th>Name / Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <ng-container *ngFor="let user of userRoles; let i = index; trackBy: trackByRole">
            <tr>
              <td>
                <div class="tbl-avatar" [ngStyle]="getAvatarStyle(i)">
                  {{user?.name | initials}}</div>
              </td>
              <td>
                <div style="font-weight:600">{{user?.name}}
                  <span *ngIf="cookieUserData.id == user?.id"
                    style="font-size:10px;background:#00C8A0;color:#fff;padding:1px 7px;border-radius:20px;margin-left:4px">You</span>
                </div>
                <div class="text-xs text-muted">{{user?.email}}</div>
              </td>
              <td><span [class]="roleGradients[i % roleGradients.length]">{{user?.role}}</span></td>
              <td><span style="font-size:.78rem;font-weight:600;color:#10B981">{{user?.active==true? '● Active': '● In
                  Active'}}</span></td>
              <td>
                <div class="tbl-actions"><button (click)="openAddNewUserPopup(user)" class="btn btn-sm btn-outline"><i class="ri-edit-line"></i>
                    Edit</button>
                    <button (click)="onUserRemove(user)" *ngIf="!(cookieUserData.id == user?.id)" class="btn btn-sm btn-danger"><i class="ri-delete-bin-line"></i></button>
                  </div>
              </td>
            </tr>
          </ng-container>
        </tbody>
      </table>
    </div>
  </div>
</main>
