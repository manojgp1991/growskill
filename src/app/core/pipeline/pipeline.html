<div class="main-content">

  <!-- Banner -->
  <div style="margin-bottom:18px;border-radius:14px;overflow:hidden;height:80px;position:relative">
    <img src="images/pipeline-icon.svg" alt="Pipeline" style="width:100%;height:100%;object-fit:cover"/>
    <div style="position:absolute;inset:0;background:linear-gradient(90deg,rgba(13,27,42,.75) 0%,transparent 55%);display:flex;align-items:center;padding:0 22px;gap:14px">
      <i class="ri-kanban-view-line" style="color:#00C8A0;font-size:24px"></i>
      <div style="color:#fff">
        <div style="font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700">Visual Sales Pipeline</div>
        <div style="font-size:.8rem;opacity:.75">Drag cards between columns to update stage</div>
      </div>
    </div>
  </div>

  <!-- Board -->
  <div class="pipeline-board">
    <div
      *ngFor="let status of statusOrder"
      class="pipeline-col"
      [id]="'col-' + status.key"
      (dragover)="onDragOver($event, status.key)"
      (dragleave)="onDragLeave(status.key)"
      (drop)="onDrop($event, status.key)">

      <div class="pipeline-col-header">
        <div class="pipeline-col-title">
          <span class="col-dot" [style.background]="status.color_code"></span>
          <span>{{ status.label }}</span>
        </div>
        <span class="col-count">{{ getContactsByStatus(status.key).length }}</span>
      </div>

      <div class="pipeline-cards">
        <ng-container *ngIf="getContactsByStatus(status.key).length > 0; else emptyCol">
          <div
            *ngFor="let contact of getContactsByStatus(status.key); let i = index;"
            class="pipeline-card"
            [attr.data-id]="contact.id"
            [draggable]="canEdit"
            (dragstart)="onDragStart($event, contact.id)"
            (dragend)="onDragEnd($event)"
            (click)="openContactDetail(contact)"
            [style.cursor]="canEdit ? 'grab' : 'pointer'">

            <div class="pc-name">{{ contact.name }}</div>
            <div class="pc-co">{{ contact.company || '' }}</div>
            <div class="pc-meta">
              <div class="pc-assignee">
                <ng-container *ngIf="getUser(contact.assignedTo) as u; else unassigned">
                  <div class="mini-av" [ngStyle]="getAvatarStyle(i)">
                    {{ u.name | initials }}
                  </div>
                  {{ u.name.split(' ')[0] }}
                </ng-container>
                <ng-template #unassigned>Unassigned</ng-template>
              </div>
              <div class="pc-date">{{ contact.createdAt | date:'dd/MM/yyyy'}}</div>
            </div>

          </div>
        </ng-container>
        <ng-template #emptyCol>
          <div style="padding:18px 0;text-align:center;color:var(--gray-400);font-size:.8rem">Drop here</div>
        </ng-template>
      </div>

    </div>
  </div>

</div>
