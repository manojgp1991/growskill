<main class="main-content">


  <div class="card">
  <div id="settings-content">

    <div id="tab-users" class="card" style="display: block;">
      <div class="card-header">
        <div><div class="card-title">Add New Email Template</div><div class="card-subtitle">Create a new email template with a customized content</div></div>
      </div>
      <div class="card-body" style="height: 100vh;">
        <div class="form-grid">
          <div class="form-group full"><label>Template Name *</label><input type="text" id="su-name" placeholder="Enter template name"></div>
        
          <div class="form-group full">
            
            <div class="NgxEditor__Wrapper">
            <ngx-editor-menu [editor]="editor"> </ngx-editor-menu>
            <ngx-editor
                [editor]="editor"
                [ngModel]="html"
                [disabled]="false"
                [placeholder]="'Type your email here...'" >
            </ngx-editor>
            </div>

          </div>
        </div>
        <div class="footer-option">
             <button routerLink="/email-templates" class="btn btn-secondary" style="margin-right: 6px;">Cancel</button>
        <button class="btn btn-primary"><i class="ri-save-line"></i> Save Template</button>
        </div>
       
      </div>
    </div>


  </div>

  </div>
</main>
