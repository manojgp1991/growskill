<div class="modal-header">
  <h3 class="popup-header"><i class="ri-user-add-line" style="color:var(--teal)"></i> Add New Contact</h3>
  <button class="modal-close" (click)="closeModel('close')"><i class="ri-close-line"></i></button>
</div>
<form (ngSubmit)="f.form.valid && onUpdateUser()" #f="ngForm" novalidate>
<div class="modal-body">
  <div class="form-grid">
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" [(ngModel)]="contactModel.name" name="name" #name="ngModel" id="add-name"
      [ngClass]="{ 'is-invalid': f.submitted && name.invalid }" placeholder="John Doe" required />
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" appEmailOnly id="add-email" [(ngModel)]="contactModel.email" name="email" #email="ngModel"
      [ngClass]="{ 'is-invalid': f.submitted && email.invalid }" placeholder="john@company.com" required/>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="text" appNumberOnly id="add-phone" [(ngModel)]="contactModel.phone" name="phone" #phone="ngModel"
      [ngClass]="{ 'is-invalid': f.submitted && phone.invalid }" placeholder="+91 99999 00000" required/></div>
    <div class="form-group">
      <label>Company</label>
      <input type="text" id="add-company" [(ngModel)]="contactModel.company" name="company" #company="ngModel"
      [ngClass]="{ 'is-invalid': f.submitted && company.invalid }" placeholder="Company Name" required/>
    </div>
    <div class="form-group"><label>Pipeline Stage</label>
      <select id="add-status" [(ngModel)]="contactModel.status_id" required name="status_id" #status_id="ngModel">
        <option value="0">-Select Status-</option>
        <option [value]="s.id" *ngFor="let s of status">{{s.caption}}</option>
      </select>
    </div>
    <div class="form-group"><label>Assign To</label>
      <select [(ngModel)]="contactModel.assignedTo_id" required name="assignedTo_id" #assignedTo_id="ngModel">
         <option value="0">-Select Assigned To-</option>
         <option [value]="u.id" *ngFor="let u of userList">{{u.name}}</option>
      </select>
    </div>
  </div>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" type="button" (click)="closeModel('close')">Cancel</button>
  <button class="btn btn-primary" type="submit"><i class="ri-save-line"></i> Save Contact</button>
</div>
</form>
